services:
  db:
    image: postgres:15-alpine
    container_name: subscription_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscription_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # optional: seed script
    ports:
      - "5431:5432"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    build: ./frontend
    container_name: subscription_frontend
    ports:
      - "8040:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: subscription_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/subscription_analytics
      JWT_SECRET: your_jwt_secret_here_change_in_production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network


volumes:
  postgres_data:


networks:
  app-network:
    driver: bridge
