apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: subscription-man
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: subscription-backend:latest  # Assume user builds locally and pushes to k8s registry
          imagePullPolicy: IfNotPresent
          env:
          - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: subscription-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: subscription-secrets
              key: JWT_SECRET
        - name: PORT
          value: "5000"
          ports:
          - containerPort: 5000
          livenessProbe:
          httpGet:
            path: /api/usage
            port: 5000
            httpHeaders:
            - name: Authorization
              value: "Bearer dummy-token" # Basic check, or create a health endpoint
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: subscription-man
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
